<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>一维优化算法 ~ 引入</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 20px;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #343a40;
            margin-bottom: 10px;
            text-align: center;
        }

        .controls {
            margin: 20px 0;
            padding: 15px;
            background: #f1f3f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        label {
            font-weight: 600;
            color: #495057;
        }

        input[type="range"] {
            width: 300px;
        }

        #c-value {
            font-family: monospace;
            font-size: 1.1em;
            color: #007bff;
            font-weight: bold;
            min-width: 30px;
        }

        .line-f1 {
            fill: none;
            stroke: #007bff;
            stroke-width: 3;
        }

        .line-f2 {
            fill: none;
            stroke: #dc3545;
            stroke-width: 2;
            stroke-dasharray: 6, 4;
        }

        .axis text {
            font-size: 12px;
            color: #6c757d;
        }

        .cobweb-path {
            fill: none;
            stroke: #28a745;
            stroke-width: 1.5;
            stroke-opacity: 0.8;
        }

        .source-point {
            fill: #ff7f0e;
            stroke: #fff;
            stroke-width: 2px;
            cursor: move;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #495057;
        }

        .legend-color {
            width: 20px;
            height: 4px;
            border-radius: 2px;
        }

        #chart {
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>雷神之锤倒数平方根优化</h2>
        <p style="text-align: center; color: #6c757d;">
            基于牛顿法迭代公式，绘制迭代函数f1和恒等函数f2<br>
            拖动 x 轴上的橙色点，观察迭代收敛过程。
        </p>

        <div class="controls">
            <label for="c-slider">参数 c</label>
            <input type="range" id="c-slider" min="0" max="10" step="0.1" value="1">
            <span id="c-value">1.0</span>
        </div>

        <div id="chart"></div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: #007bff;"></div>
                <span>f1(x) = x(1.5 - 0.5cx²)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #dc3545; border-top: 2px dashed #dc3545; height: 0;">
                </div>
                <span>f2(x) = x</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #28a745;"></div>
                <span>收敛折线</span>
            </div>
        </div>
    </div>

    <script>
        // 画布尺寸配置
        const margin = { top: 30, right: 30, bottom: 50, left: 60 };
        const width = 700 - margin.left - margin.right;
        const height = 400 - margin.top - margin.bottom;

        // 创建 SVG 容器
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // 比例尺
        const xScale = d3.scaleLinear().range([0, width]);
        const yScale = d3.scaleLinear().range([height, 0]);

        // 坐标轴容器
        const xAxisG = svg.append("g")
            .attr("class", "axis")
            .attr("transform", `translate(0,${height})`);

        const yAxisG = svg.append("g")
            .attr("class", "axis");

        // 曲线生成器
        const lineGenerator = d3.line()
            .x(d => xScale(d.x))
            .y(d => yScale(d.y))
            .curve(d3.curveMonotoneX);

        // 路径元素
        const pathF1 = svg.append("path").attr("class", "line-f1");
        const pathF2 = svg.append("path").attr("class", "line-f2");
        const pathCobweb = svg.append("path").attr("class", "cobweb-path");

        // 交互状态
        let currentC = 1.0;
        let sourceX = 0.5;

        // 发射源点
        const sourcePoint = svg.append("circle")
            .attr("class", "source-point")
            .attr("r", 6);

        // 拖拽行为
        const drag = d3.drag()
            .on("drag", function (event) {
                const xVal = xScale.invert(event.x);
                // 限制在当前 x 轴范围内
                const domain = xScale.domain();
                sourceX = Math.max(domain[0], Math.min(domain[1], xVal));
                updateCobweb();
            });

        sourcePoint.call(drag);

        function f1(x, c) {
            return x * (1.5 - 0.5 * c * x * x);
        }

        function updateCobweb() {
            const points = [];
            let currX = sourceX;

            // 起点 (x0, 0)
            points.push({ x: currX, y: 0 });

            const maxIter = 50;
            const epsilon = 0.001;

            for (let i = 0; i < maxIter; i++) {
                // 向上到 f1: (currX, f1(currX))
                const nextY = f1(currX, currentC);
                points.push({ x: currX, y: nextY });

                // 向右到 f2 (y=x): (nextY, nextY)
                const nextX = nextY;
                points.push({ x: nextX, y: nextY });

                // 检查收敛
                if (Math.abs(nextX - currX) < epsilon) break;

                currX = nextX;
                // 如果超出绘制范围也停止
                if (currX < 0 || currX > xScale.domain()[1]) break;
            }

            // 更新折线
            pathCobweb.datum(points)
                .attr("d", d3.line()
                    .x(d => xScale(d.x))
                    .y(d => yScale(d.y))
                );

            // 更新点的位置
            sourcePoint
                .attr("cx", xScale(sourceX))
                .attr("cy", yScale(0));
        }

        // 更新函数
        function update(c) {
            currentC = c;
            // 更新显示值
            d3.select("#c-value").text(c.toFixed(1));

            // 计算绘制范围：零点为 0 和 sqrt(3/c)
            let xMin = 0;
            let xMax;
            if (c <= 0) {
                xMax = 2; // 当 c=0 时的默认显示范围
            } else {
                xMax = Math.sqrt(3 / c);
            }

            // 生成数据点
            const dataF1 = [];
            const dataF2 = [];
            const points = 200;
            for (let i = 0; i <= points; i++) {
                const xVal = xMin + (xMax - xMin) * (i / points);
                const yVal1 = xVal * (1.5 - 0.5 * c * xVal * xVal);
                const yVal2 = xVal;
                dataF1.push({ x: xVal, y: yVal1 });
                dataF2.push({ x: xVal, y: yVal2 });
            }

            // 更新比例尺定义域
            xScale.domain([xMin, xMax]);
            const allY = [...dataF1.map(d => d.y), ...dataF2.map(d => d.y)];
            yScale.domain([0, d3.max(allY) * 1.1]);

            // 平滑更新坐标轴
            xAxisG.transition().duration(400).call(d3.axisBottom(xScale).ticks(8));
            yAxisG.transition().duration(400).call(d3.axisLeft(yScale).ticks(8));

            // 平滑更新曲线
            pathF1.datum(dataF1)
                .transition().duration(400)
                .attr("d", lineGenerator);

            pathF2.datum(dataF2)
                .transition().duration(400)
                .attr("d", lineGenerator);

            // 确保 sourceX 在新范围内
            sourceX = Math.min(sourceX, xMax);
            updateCobweb();
        }

        // 监听滑块
        d3.select("#c-slider").on("input", function () {
            update(+this.value);
        });

        // 初始绘制
        update(1.0);
    </script>
</body>

</html>
