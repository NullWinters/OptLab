{% extends 'admin/layout.html' %}
{% set admin_title = '实验管理' %}

{% block admin_content %}
<div class="admin-page-header">
    <div>
        <h1>实验管理</h1>
        <span class="breadcrumb">查看所有用户的实验记录</span>
    </div>
    <button class="admin-btn admin-btn-secondary" onclick="loadExperiments()">
        <i class="fas fa-sync-alt"></i> 刷新
    </button>
</div>

<div class="admin-card">
    <div class="admin-card-body">
        <div class="admin-toolbar">
            <select class="admin-select" id="exp-type-filter" onchange="loadExperiments()">
                <option value="">全部类型</option>
            </select>
            <input type="text" class="admin-search" id="exp-user-filter" placeholder="按用户ID筛选..."
                   oninput="debounceFilter()" style="max-width:180px;">
        </div>
        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th><th>别名</th><th>实验页面</th><th>用户</th><th>创建时间</th><th>操作</th>
                </tr>
                </thead>
                <tbody id="exp-tbody"><tr><td colspan="6" class="admin-loading"><span class="admin-spinner"></span>加载中...</td></tr></tbody>
            </table>
        </div>
        <div id="exp-pagination" class="admin-pagination"></div>
    </div>
</div>

{# 详情弹窗 #}
<div id="exp-detail-modal" class="admin-modal-overlay" style="display:none;">
    <div class="admin-modal">
        <div style="display:flex;justify-content:space-between;align-items:start;">
            <h3>实验详情</h3>
            <button class="admin-btn admin-btn-sm admin-btn-secondary" onclick="closeExpDetail()">关闭</button>
        </div>
        <div id="exp-detail-content"></div>
    </div>
</div>

{# 删除确认弹窗 #}
<div id="exp-delete-modal" class="admin-modal-overlay" style="display:none;">
    <div class="admin-modal" style="max-width:400px;">
        <h3>确认删除</h3>
        <p id="exp-delete-msg" style="color:#6d4c41;margin-bottom:16px;"></p>
        <div class="admin-modal-actions">
            <button class="admin-btn admin-btn-secondary" onclick="closeExpDelete()">取消</button>
            <button class="admin-btn admin-btn-danger" id="exp-delete-btn">确认删除</button>
        </div>
    </div>
</div>
{% endblock %}

{% block admin_scripts %}
<script src="/static/js/admin-experiments.js"></script>
{% endblock %}
