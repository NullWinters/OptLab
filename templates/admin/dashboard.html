{% extends 'admin/layout.html' %}
{% set admin_title = '仪表盘' %}

{% block admin_content %}
<div class="admin-page-header">
    <div>
        <h1>仪表盘</h1>
        <span class="breadcrumb">系统概览</span>
    </div>
    <button class="admin-btn admin-btn-secondary" onclick="location.reload()">
        <i class="fas fa-sync-alt"></i> 刷新
    </button>
</div>

{# 统计卡片 #}
<div class="admin-stat-grid" id="stat-cards">
    <div class="admin-loading"><span class="admin-spinner"></span>加载中...</div>
</div>

{# 实验类型分布 #}
<div class="admin-card" id="type-dist-card" style="display:none;">
    <div class="admin-card-header"><h2>实验类型分布</h2></div>
    <div class="admin-card-body" id="type-dist-body"></div>
</div>

{# 最近活动 #}
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:20px;margin-top:20px;">
    {# 最近注册用户 #}
    <div class="admin-card" id="recent-users-card" style="display:none;">
        <div class="admin-card-header"><h2>最近注册用户</h2></div>
        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead><tr><th>用户名</th><th>邮箱</th><th>注册时间</th></tr></thead>
                <tbody id="recent-users-tbody"></tbody>
            </table>
        </div>
    </div>
    {# 最近实验 #}
    <div class="admin-card" id="recent-exps-card" style="display:none;">
        <div class="admin-card-header"><h2>最近实验记录</h2></div>
        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead><tr><th>别名</th><th>类型</th><th>用户</th><th>时间</th></tr></thead>
                <tbody id="recent-exps-tbody"></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block admin_scripts %}
<script src="/static/js/admin.js"></script>
<script>
(function() {
    if (!ensureAdminAuth()) return;
    loadDashboard();

    async function loadDashboard() {
        try {
            const data = await adminApi('/api/admin/dashboard/stats');
            renderStats(data);
            renderTypeDist(data.experiments_by_type);
            renderRecentUsers(data.recent_users);
            renderRecentExps(data.recent_experiments);
        } catch (e) {
            console.error(e);
        }
    }

    function renderStats(d) {
        const cards = [
            { label: '用户总数', value: d.users_total, hint: `今日新增 ${d.users_new_today} 人`, icon: 'users' },
            { label: '实验记录', value: d.experiments_total, hint: `今日新增 ${d.experiments_today} 条`, icon: 'flask' },
            { label: '实验笔记', value: d.notes_total, hint: '用户笔记总数', icon: 'sticky-note' },
            { label: 'AI 会话', value: d.chats_total, hint: 'AI 助手会话', icon: 'robot' },
        ];
        document.getElementById('stat-cards').innerHTML = cards.map(c =>
            `<div class="admin-stat-card">
                <div class="label"><i class="fas fa-${c.icon}" style="margin-right:6px;"></i>${c.label}</div>
                <div class="value">${c.value}</div>
                <div class="hint">${c.hint}</div>
            </div>`
        ).join('');
    }

    function renderTypeDist(types) {
        if (!types || types.length === 0) {
            document.getElementById('type-dist-card').style.display = 'none';
            return;
        }
        document.getElementById('type-dist-card').style.display = '';
        document.getElementById('type-dist-body').innerHTML =
            '<table class="admin-table"><thead><tr><th>实验页面</th><th>记录数</th></tr></thead><tbody>' +
            types.map(t => `<tr><td>${escHtml(t.source_page)}</td><td><strong>${t.count}</strong></td></tr>`).join('') +
            '</tbody></table>';
    }

    function renderRecentUsers(users) {
        var card = document.getElementById('recent-users-card');
        if (!users || users.length === 0) { card.style.display = 'none'; return; }
        card.style.display = '';
        document.getElementById('recent-users-tbody').innerHTML = users.map(u =>
            `<tr><td>${escHtml(u.username)}</td><td class="mono">${escHtml(u.email)}</td><td>${fmtTime(u.created_at)}</td></tr>`
        ).join('');
    }

    function renderRecentExps(exps) {
        var card = document.getElementById('recent-exps-card');
        if (!exps || exps.length === 0) { card.style.display = 'none'; return; }
        card.style.display = '';
        document.getElementById('recent-exps-tbody').innerHTML = exps.map(e =>
            `<tr><td>${escHtml(e.alias || '—')}</td><td>${escHtml(e.source_page || '—')}</td><td>${escHtml(e.username)}</td><td>${fmtTime(e.created_at)}</td></tr>`
        ).join('');
    }
})();
</script>
{% endblock %}
