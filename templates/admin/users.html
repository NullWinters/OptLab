{% extends 'admin/layout.html' %}
{% set admin_title = '用户管理' %}

{% block admin_content %}
<div class="admin-page-header">
    <div>
        <h1>用户管理</h1>
        <span class="breadcrumb">查看与管理所有注册用户</span>
    </div>
    <button class="admin-btn admin-btn-secondary" onclick="loadUsers()">
        <i class="fas fa-sync-alt"></i> 刷新
    </button>
</div>

<div class="admin-card">
    <div class="admin-card-body">
        <div class="admin-toolbar">
            <input type="text" class="admin-search" id="user-search" placeholder="搜索用户名或邮箱..."
                   oninput="debounceSearch()">
        </div>
        <div class="admin-table-wrap">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>ID</th><th>用户名</th><th>邮箱</th><th>注册时间</th>
                    <th>实验数</th><th>笔记数</th><th>操作</th>
                </tr>
                </thead>
                <tbody id="user-tbody"><tr><td colspan="7" class="admin-loading"><span class="admin-spinner"></span>加载中...</td></tr></tbody>
            </table>
        </div>
        <div id="user-pagination" class="admin-pagination"></div>
    </div>
</div>

{# 用户详情弹窗 #}
<div id="user-detail-modal" class="admin-modal-overlay" style="display:none;">
    <div class="admin-modal">
        <div style="display:flex;justify-content:space-between;align-items:start;">
            <h3>用户详情</h3>
            <button class="admin-btn admin-btn-sm admin-btn-secondary" onclick="closeUserDetail()">关闭</button>
        </div>
        <div id="user-detail-content"></div>
    </div>
</div>

{# 删除确认弹窗 #}
<div id="delete-confirm-modal" class="admin-modal-overlay" style="display:none;">
    <div class="admin-modal" style="max-width:400px;">
        <h3>确认删除</h3>
        <p id="delete-confirm-msg" style="color:#6d4c41;margin-bottom:16px;"></p>
        <div class="admin-modal-actions">
            <button class="admin-btn admin-btn-secondary" onclick="closeDeleteConfirm()">取消</button>
            <button class="admin-btn admin-btn-danger" id="delete-confirm-btn">确认删除</button>
        </div>
    </div>
</div>
{% endblock %}

{% block admin_scripts %}
<script src="/static/js/admin-users.js"></script>
{% endblock %}
