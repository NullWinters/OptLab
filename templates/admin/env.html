{% extends 'admin/layout.html' %}
{% set admin_title = '环境变量' %}

{% block admin_content %}
<div class="admin-page-header">
    <div>
        <h1>环境变量管理</h1>
        <span class="breadcrumb">编辑 .env 配置文件</span>
    </div>
</div>

<div class="admin-card">
    <div class="admin-card-header"><h2>当前配置</h2></div>
    <div class="admin-card-body">
        <form id="env-vars-form">
            <div class="admin-env-grid" id="env-vars-container">
                <div class="admin-loading"><span class="admin-spinner"></span>加载中...</div>
            </div>
            <div style="margin-top:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <button type="submit" class="admin-btn admin-btn-primary" id="save-env-btn">
                    <i class="fas fa-save"></i> 保存配置
                </button>
                <span id="env-save-status" style="font-size:0.9em;"></span>
            </div>
        </form>
        <p class="admin-hint">注意：修改 LLM 相关配置后需要重启服务才能生效。敏感字段显示为 ********。</p>
    </div>
</div>
{% endblock %}

{% block admin_scripts %}
<script src="/static/js/admin.js"></script>
<script>
(function() {
    if (!ensureAdminAuth()) return;
    loadEnvVars();

    document.getElementById('env-vars-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var inputs = document.querySelectorAll('#env-vars-container input');
        var vars = {};
        inputs.forEach(function(inp) {
            vars[inp.name] = inp.value;
        });
        var status = document.getElementById('env-save-status');
        status.innerHTML = '<span class="admin-spinner" style="width:14px;height:14px;border-width:2px;"></span> 保存中...';
        try {
            var res = await adminApi('/api/admin/env', {
                method: 'PUT',
                body: JSON.stringify({vars: vars})
            });
            status.innerHTML = '<span style="color:#2E7D32;"><i class="fas fa-check-circle"></i> ' + escHtml(res.message) + '</span>';
        } catch (e) {
            status.innerHTML = '<span style="color:#C62828;"><i class="fas fa-times-circle"></i> 保存失败: ' + escHtml(e.message) + '</span>';
        }
    });

    async function loadEnvVars() {
        try {
            var vars = await adminApi('/api/admin/env');
            var keys = Object.keys(vars).sort();
            document.getElementById('env-vars-container').innerHTML = keys.map(function(k) {
                var isSensitive = vars[k] === '********';
                return '<div class="admin-env-field">' +
                    '<label for="env-' + escHtml(k) + '" title="' + escHtml(k) + '">' + escHtml(k) + '</label>' +
                    '<input type="' + (isSensitive ? 'password' : 'text') + '" id="env-' + escHtml(k) + '" name="' + escHtml(k) + '" value="' + escHtml(vars[k]) + '">' +
                    '</div>';
            }).join('');
        } catch (e) {
            document.getElementById('env-vars-container').innerHTML =
                '<div class="admin-alert error">加载失败: ' + escHtml(e.message) + '</div>';
        }
    }
})();
</script>
{% endblock %}
