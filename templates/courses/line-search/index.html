<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="/static/css/sub-courses.css">

<body>
    <div class="container max-w-6xl">
        <a href="/courses/" class="btn-back">
            返回课程页
        </a>

        <header class="header">
            <h1>一维搜索方法</h1>
            <p>探索无约束优化的基本问题，掌握单变量极值搜索的各种策略。</p>
        </header>

        <div class="card-grid cols-3">
            <!-- 区间收缩法卡片 -->
            <div class="card">
                <div>
                    <div class="card-icon bg-amber-100">
                        <i class="fas fa-arrows-alt-h"></i>
                    </div>
                    <h2>区间收缩法</h2>
                    <p>
                        通过不断缩小包含极小值的区间来逼近最优解，包含黄金分割法、斐波那契数列法及二分法。
                    </p>
                </div>
                <a href="range_search/introduction.html" class="btn-start">
                    开始学习
                </a>
            </div>

            <!-- 点搜索卡片 -->
            <div class="card">
                <div>
                    <div class="card-icon bg-orange-100">
                        <i class="fas fa-bullseye"></i>
                    </div>
                    <h2>点搜索</h2>
                    <p>
                        利用导数信息指导搜索方向，包含梯度下降法、牛顿法及割线法等经典迭代算法。
                    </p>
                </div>
                <a href="point_search/introduction.html" class="btn-start">
                    开始学习
                </a>
            </div>

            <!-- 应用实践卡片 -->
            <div class="card">
                <div>
                    <div class="card-icon bg-amber-100">
                        <i class="fas fa-flask"></i>
                    </div>
                    <h2>应用实践</h2>
                    <p>
                        将一维搜索算法应用于实际问题，以最小二乘分析与最优定价策略为例，体验算法的工程价值。
                    </p>
                </div>
                <a href="application/main.html" class="btn-start">
                    进入实验
                </a>
            </div>
        </div>
    </div>

    一维搜索方法 · OptLab 教学资源
