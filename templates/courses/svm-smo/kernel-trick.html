<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVM 核技巧可视化 - OptLab</title>
    <style>
        :root {
            --bg: #fff8ef;
            --panel: #fffdf8;
            --border: #e9d4bf;
            --primary: #d96a2b;
            --primary-dark: #b9531d;
            --text: #5f3a1f;
            --muted: #8f6a4f;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: radial-gradient(circle at 20% 0%, #fffdf6 0%, var(--bg) 60%);
            color: var(--text);
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        .page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 20px;
            min-height: 100vh;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(217, 106, 43, 0.12);
            padding: 16px;
            height: fit-content;
            position: sticky;
            top: 16px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.2rem;
        }

        .hint {
            margin: 0 0 14px;
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .group {
            border-top: 1px dashed var(--border);
            padding-top: 12px;
            margin-top: 12px;
        }

        .group h2 {
            margin: 0 0 8px;
            font-size: 0.96rem;
            color: var(--primary-dark);
        }

        label {
            font-size: 0.86rem;
            display: block;
            margin: 8px 0 4px;
        }

        input[type="file"],
        select,
        input[type="range"],
        button {
            width: 100%;
        }

        select, input[type="file"], input[type="range"] {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            background: #fff;
            color: var(--text);
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            margin-top: 10px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover { background: var(--primary-dark); }

        .scene-wrap {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(217, 106, 43, 0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 80vh;
        }

        .scene-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            background: #fff9f2;
            font-size: 0.9rem;
        }

        #scene {
            width: 100%;
            flex: 1;
        }

        .inline {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
        }

        .value {
            font-size: 0.8rem;
            color: var(--muted);
            min-width: 42px;
            text-align: right;
        }

        @media (max-width: 1100px) {
            .page { grid-template-columns: 1fr; }
            .panel { position: static; }
            .scene-wrap { min-height: 65vh; }
        }
    </style>
</head>
<body>
<div class="page">
    <aside class="panel">
        <h1>演示核技巧（函数变换）</h1>
        <p class="hint">上传 CSV 后手动选择 x/y/标签列。通过多项式核或高斯核把二维点映射到 z 轴，观察从线性不可分到线性可分的变化。</p>

        <div class="group">
            <h2>1) 上传数据集</h2>
            <label for="csv-file">CSV 文件</label>
            <input id="csv-file" type="file" accept=".csv" />
            <label for="preset-dataset">或选择预设数据集</label>
            <select id="preset-dataset">
                <option value="xor">XOR 交叉分布（二维不可线性分）</option>
                <option value="rings">双环分布（二维不可线性分）</option>
                <option value="linear">线性可分对照组</option>
            </select>
            <button id="load-preset-btn" type="button">加载预设数据集</button>
            <label for="x-col">x 列</label>
            <select id="x-col"></select>
            <label for="y-col">y 列</label>
            <select id="y-col"></select>
            <label for="label-col">标签列</label>
            <select id="label-col"></select>
            <button id="load-btn">加载并可视化</button>
            <p id="dataset-status" class="hint" style="margin-top:8px; margin-bottom:0;"></p>
        </div>

        <div class="group">
            <h2>2) 核技巧（z轴函数变换）</h2>
            <label for="kernel-type">核函数</label>
            <select id="kernel-type">
                <option value="poly">多项式核 (Polynomial)</option>
                <option value="rbf">高斯核 (RBF)</option>
            </select>

            <label for="poly-degree">多项式次数 d</label>
            <div class="inline">
                <input id="poly-degree" type="range" min="2" max="6" value="3" />
                <span class="value" id="poly-degree-val">3</span>
            </div>

            <label for="rbf-gamma">高斯核 γ</label>
            <div class="inline">
                <input id="rbf-gamma" type="range" min="0.2" max="3" step="0.1" value="1.2" />
                <span class="value" id="rbf-gamma-val">1.2</span>
            </div>

            <button id="animate-btn">升维动画</button>
            <button id="default-mode-btn" type="button">默认参数模式</button>
        </div>

        <div class="group">
            <h2>3) 超平面（可移动）</h2>
            <label for="plane-z">沿 Z 轴平移</label>
            <div class="inline">
                <input id="plane-z" type="range" min="-2" max="2" step="0.05" value="0" />
                <span class="value" id="plane-z-val">0.00</span>
            </div>

            <label for="plane-yaw">绕 Y 轴旋转 (Yaw)</label>
            <div class="inline">
                <input id="plane-yaw" type="range" min="-90" max="90" step="1" value="0" />
                <span class="value" id="plane-yaw-val">0°</span>
            </div>

            <label for="plane-pitch">绕 X 轴旋转 (Pitch)</label>
            <div class="inline">
                <input id="plane-pitch" type="range" min="-90" max="90" step="1" value="0" />
                <span class="value" id="plane-pitch-val">0°</span>
            </div>

            <p id="split-acc" class="hint" style="margin-top:10px; margin-bottom:0;">划分准确率：--</p>
        </div>
    </aside>

    <section class="scene-wrap">
        <div class="scene-head">
            <span>Three.js 主引擎 · 暖色亮色主题</span>
            <a href="/courses/svm-smo/" style="color:#b9531d;text-decoration:none;">返回 SVM 目录</a>
        </div>
        <div id="scene"></div>
    </section>
</div>

<script src="/static/vendor/three/three.min.js"></script>
<script>
    if (typeof THREE === 'undefined') {
        document.write('<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"><\\/script>');
    }
</script>
<script>
    if (typeof THREE === 'undefined') {
        document.body.innerHTML = '<div style="padding:24px;color:#b71c1c;font-family:Segoe UI,Microsoft YaHei,sans-serif;">Three.js 加载失败（本地与 CDN 均不可用），请检查网络后刷新页面。</div>';
        throw new Error('THREE is not loaded');
    }

    const $ = id => document.getElementById(id);
    const statusEl = $('dataset-status');
    const accEl = $('split-acc');

    function setStatus(msg, isError = false) {
        if (!statusEl) return;
        statusEl.textContent = msg;
        statusEl.style.color = isError ? '#c62828' : '#8f6a4f';
    }

    function setAccuracyText(text) {
        if (!accEl) return;
        accEl.textContent = text;
    }

    const state = {
        headers: [],
        rows: [],
        points: [],
        pointsMesh: null,
        targetZ: [],
        currentZ: [],
        minX: 0,
        maxX: 1,
        minY: 0,
        maxY: 1,
    };

    // ---------- Three.js ----------
    const container = $('scene');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfff9f2);

    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 1000);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const cameraArm = {
        radius: 16,
        theta: Math.PI * 0.25,
        phi: Math.PI * 0.34,
        target: new THREE.Vector3(0, 0, 0)
    };

    function updateCameraFromArm() {
        cameraArm.phi = Math.min(Math.PI - 0.1, Math.max(0.1, cameraArm.phi));
        cameraArm.radius = Math.min(40, Math.max(4, cameraArm.radius));

        const sinPhi = Math.sin(cameraArm.phi);
        camera.position.set(
            cameraArm.target.x + cameraArm.radius * sinPhi * Math.cos(cameraArm.theta),
            cameraArm.target.y + cameraArm.radius * Math.cos(cameraArm.phi),
            cameraArm.target.z + cameraArm.radius * sinPhi * Math.sin(cameraArm.theta)
        );
        camera.lookAt(cameraArm.target);
    }

    updateCameraFromArm();

    let isDragging = false;
    let lastX = 0;
    let lastY = 0;

    renderer.domElement.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;

        cameraArm.theta -= dx * 0.006;
        cameraArm.phi -= dy * 0.006;
        updateCameraFromArm();
    });

    renderer.domElement.addEventListener('wheel', (e) => {
        e.preventDefault();
        cameraArm.radius *= (1 + e.deltaY * 0.0012);
        updateCameraFromArm();
    }, { passive: false });

    const hemi = new THREE.HemisphereLight(0xfff3dd, 0xd8a67a, 1.15);
    scene.add(hemi);
    const dir = new THREE.DirectionalLight(0xffffff, 0.65);
    dir.position.set(4, 10, 6);
    scene.add(dir);

    const grid = new THREE.GridHelper(12, 12, 0xe3b997, 0xf3dcc8);
    scene.add(grid);

    const axes = new THREE.AxesHelper(4);
    scene.add(axes);

    const planeGeom = new THREE.PlaneGeometry(10, 10, 1, 1);
    const planeMat = new THREE.MeshStandardMaterial({
        color: 0xf29f67,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.35,
        roughness: 0.5,
        metalness: 0.0
    });
    const plane = new THREE.Mesh(planeGeom, planeMat);
    plane.rotation.x = Math.PI / 2;
    scene.add(plane);

    function resize() {
        const w = container.clientWidth;
        const h = container.clientHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    function animate() {
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    animate();

    // ---------- CSV ----------
    $('csv-file').addEventListener('change', async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const text = await file.text();
        parseCsv(text);
    });

    const PRESET_DATASETS = {
        xor: `x,y,label
-2,-2,A
-1.5,-1.7,A
-1.2,-0.8,B
-0.8,-1.1,B
0.7,0.9,A
1.2,1.4,A
1.5,0.6,B
2.0,1.1,B
-2,1.8,B
-1.4,1.1,B
-0.8,0.7,A
0.2,-0.1,A
1.1,-1.5,B
1.8,-1.1,B
0.9,-0.8,A
-0.5,0.3,A`,
        rings: `x,y,label
2.3,0.1,A
1.8,1.2,A
0.9,2.0,A
-0.7,2.1,A
-1.9,1.1,A
-2.2,-0.2,A
-1.5,-1.5,A
-0.2,-2.3,A
1.3,-1.8,A
2.1,-0.9,A
0.8,0.1,B
0.4,0.5,B
-0.3,0.7,B
-0.7,0.1,B
-0.4,-0.6,B
0.5,-0.5,B`,
        linear: `x,y,label
-2.2,-0.8,A
-1.7,-0.4,A
-1.2,-0.2,A
-0.7,0.2,A
-0.1,0.3,A
0.4,0.7,B
0.9,1.1,B
1.4,1.3,B
1.8,1.8,B
2.2,2.0,B`
    };

    $('load-preset-btn').addEventListener('click', () => {
        const key = $('preset-dataset').value;
        parseCsv(PRESET_DATASETS[key]);
        const ok = visualizeFromSelection(false);
        if (ok) {
            setStatus('已加载预设数据集并完成三维渲染，可点击“升维动画”观察核技巧。');
        }
    });

    function parseCsv(text) {
        const lines = text.split(/\r?\n/).map(x => x.trim()).filter(Boolean);
        if (lines.length < 2) {
            setStatus('CSV 数据不足，请至少包含表头和一行数据。', true);
            return;
        }

        const headers = lines[0].split(',').map(x => x.trim());
        if (headers.length < 3) {
            setStatus('CSV 至少需要 3 列数据（x、y、label）。', true);
            return;
        }

        const rows = lines.slice(1).map(line => line.split(',').map(x => x.trim()));
        state.headers = headers;
        state.rows = rows;
        fillSelectors(headers);
        setStatus(`已读取 ${rows.length} 条数据，请确认列映射并加载可视化。`);
    }

    function fillSelectors(headers) {
        ['x-col', 'y-col', 'label-col'].forEach(id => {
            const sel = $(id);
            sel.innerHTML = '';
            headers.forEach((h, idx) => {
                const op = document.createElement('option');
                op.value = String(idx);
                op.textContent = `${h} (第${idx + 1}列)`;
                sel.appendChild(op);
            });
        });

        if (headers.length >= 3) {
            $('x-col').value = '0';
            $('y-col').value = '1';
            $('label-col').value = '2';
        }

        updateSeparationAccuracy();
    }

    function computeSplitAccuracy(yawDeg, pitchDeg, zVal) {
        if (!state.points.length || !state.currentZ.length) {
            return null;
        }

        const labels = [...new Set(state.points.map(p => p.label))];
        if (labels.length !== 2) {
            return null;
        }

        const yaw = yawDeg * Math.PI / 180;
        const pitch = pitchDeg * Math.PI / 180;
        const normal = new THREE.Vector3(0, 0, 1)
            .applyEuler(new THREE.Euler(Math.PI / 2 + pitch, yaw, 0))
            .normalize();
        const planePoint = new THREE.Vector3(0, zVal, 0);

        let posL0 = 0;
        let negL0 = 0;
        let posL1 = 0;
        let negL1 = 0;

        for (let i = 0; i < state.points.length; i++) {
            const p = state.points[i];
            const v = new THREE.Vector3(p.x, state.currentZ[i], p.y);
            const signed = normal.dot(v.clone().sub(planePoint));
            const positiveSide = signed >= 0;

            if (p.label === labels[0]) {
                if (positiveSide) posL0++; else negL0++;
            } else {
                if (positiveSide) posL1++; else negL1++;
            }
        }

        const total = state.points.length;
        const correctMap1 = posL0 + negL1;
        const correctMap2 = negL0 + posL1;
        const best = Math.max(correctMap1, correctMap2);

        return (best / total) * 100;
    }

    function updateSeparationAccuracy() {
        if (!state.points.length || !state.currentZ.length) {
            setAccuracyText('划分准确率：--');
            return;
        }

        const yawDeg = Number($('plane-yaw').value);
        const pitchDeg = Number($('plane-pitch').value);
        const zVal = Number($('plane-z').value);
        const acc = computeSplitAccuracy(yawDeg, pitchDeg, zVal);

        if (acc === null) {
            setAccuracyText('划分准确率：仅支持二分类');
            return;
        }
        setAccuracyText(`划分准确率：${acc.toFixed(1)}%（实时）`);
    }

    function autoFitPlaneFromCurrentPoints() {
        if (!state.points.length || state.points.length !== state.currentZ.length) return;

        const labels = [...new Set(state.points.map(p => p.label))];
        if (labels.length !== 2) {
            setStatus('自动划分仅支持二分类数据。', true);
            return;
        }

        let best = {
            yaw: 0,
            pitch: 0,
            z: 0,
            acc: -1
        };

        const coarseStep = { yaw: 10, pitch: 10, z: 0.2 };
        for (let yaw = -90; yaw <= 90; yaw += coarseStep.yaw) {
            for (let pitch = -90; pitch <= 90; pitch += coarseStep.pitch) {
                for (let z = -2; z <= 2.0001; z += coarseStep.z) {
                    const acc = computeSplitAccuracy(yaw, pitch, z);
                    if (acc !== null && acc > best.acc) {
                        best = { yaw, pitch, z, acc };
                    }
                }
            }
        }

        const refineStep = { yaw: 2, pitch: 2, z: 0.05 };
        const yawMin = Math.max(-90, best.yaw - 12);
        const yawMax = Math.min(90, best.yaw + 12);
        const pitchMin = Math.max(-90, best.pitch - 12);
        const pitchMax = Math.min(90, best.pitch + 12);
        const zMin = Math.max(-2, best.z - 0.5);
        const zMax = Math.min(2, best.z + 0.5);

        for (let yaw = yawMin; yaw <= yawMax + 1e-8; yaw += refineStep.yaw) {
            for (let pitch = pitchMin; pitch <= pitchMax + 1e-8; pitch += refineStep.pitch) {
                for (let z = zMin; z <= zMax + 1e-8; z += refineStep.z) {
                    const acc = computeSplitAccuracy(yaw, pitch, z);
                    if (acc !== null && acc > best.acc) {
                        best = { yaw, pitch, z, acc };
                    }
                }
            }
        }

        $('plane-z').value = String(best.z.toFixed(2));
        $('plane-yaw').value = String(Math.round(best.yaw));
        $('plane-pitch').value = String(Math.round(best.pitch));
        updatePlane();
        setStatus(`已自动拟合超平面，当前最佳划分准确率约 ${best.acc.toFixed(1)}%。`);
    }

    function visualizeFromSelection(showSuccessHint = true) {
        if (!state.rows.length) {
            setStatus('未检测到可用数据，请先上传或加载预设数据集。', true);
            return false;
        }

        const xIdx = Number($('x-col').value);
        const yIdx = Number($('y-col').value);
        const lIdx = Number($('label-col').value);

        const parsed = [];
        const labels = new Set();

        for (const row of state.rows) {
            if (Math.max(xIdx, yIdx, lIdx) >= row.length) continue;
            const x = Number(row[xIdx]);
            const y = Number(row[yIdx]);
            const label = row[lIdx];
            if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
            parsed.push({ x, y, label });
            labels.add(label);
        }

        if (!parsed.length) {
            setStatus('当前列映射无法解析出有效数值，请重新选择列。', true);
            return false;
        }

        if (labels.size > 2) {
            setStatus('标签类别超过 2 种，请更换标签列。', true);
            return false;
        }

        state.points = normalizeXY(parsed);
        createOrUpdatePoints(0);
        autoFitPlaneFromCurrentPoints();
        setStatus(`渲染完成：共 ${parsed.length} 个点，类别数 ${labels.size}。`);
        if (showSuccessHint) {
            setStatus(`渲染完成：共 ${parsed.length} 个点，类别数 ${labels.size}。点击“升维动画”查看核技巧效果。`);
        }
        return true;
    }

    $('load-btn').addEventListener('click', () => {
        visualizeFromSelection(true);
    });

    function normalizeXY(points) {
        const xs = points.map(p => p.x);
        const ys = points.map(p => p.y);
        state.minX = Math.min(...xs); state.maxX = Math.max(...xs);
        state.minY = Math.min(...ys); state.maxY = Math.max(...ys);

        const dx = Math.max(state.maxX - state.minX, 1e-6);
        const dy = Math.max(state.maxY - state.minY, 1e-6);

        return points.map(p => ({
            x: ((p.x - state.minX) / dx) * 8 - 4,
            y: ((p.y - state.minY) / dy) * 8 - 4,
            ox: p.x,
            oy: p.y,
            label: p.label
        }));
    }

    function createOrUpdatePoints(zValue = 0) {
        const geometry = new THREE.BufferGeometry();
        const pos = new Float32Array(state.points.length * 3);
        const col = new Float32Array(state.points.length * 3);

        const labels = [...new Set(state.points.map(p => p.label))];
        const colorMap = new Map([
            [labels[0], new THREE.Color('#d84315')],
            [labels[1], new THREE.Color('#1e88e5')],
        ]);

        state.currentZ = [];
        for (let i = 0; i < state.points.length; i++) {
            const p = state.points[i];
            pos[i * 3] = p.x;
            pos[i * 3 + 1] = zValue;
            pos[i * 3 + 2] = p.y;
            state.currentZ.push(zValue);

            const c = colorMap.get(p.label) || new THREE.Color('#7e57c2');
            col[i * 3] = c.r;
            col[i * 3 + 1] = c.g;
            col[i * 3 + 2] = c.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(col, 3));

        if (state.pointsMesh) {
            state.pointsMesh.geometry.dispose();
            state.pointsMesh.geometry = geometry;
        } else {
            const material = new THREE.PointsMaterial({
                size: 0.22,
                vertexColors: true
            });
            state.pointsMesh = new THREE.Points(geometry, material);
            scene.add(state.pointsMesh);
        }
    }

    // ---------- Kernel transform ----------
    function computeTargetZ() {
        const kernel = $('kernel-type').value;
        const d = Number($('poly-degree').value);
        const gamma = Number($('rbf-gamma').value);

        const raw = state.points.map(p => {
            const x = p.ox;
            const y = p.oy;
            if (kernel === 'poly') {
                return Math.pow(x, d) + Math.pow(y, d);
            }
            return Math.exp(-gamma * (x * x + y * y));
        });

        const mn = Math.min(...raw), mx = Math.max(...raw);
        const span = Math.max(mx - mn, 1e-6);
        return raw.map(v => ((v - mn) / span) * 5.5 - 1.0);
    }

    $('animate-btn').addEventListener('click', () => {
        if (!state.points.length || !state.pointsMesh) {
            setStatus('请先加载数据后再执行升维动画。', true);
            return;
        }

        state.targetZ = computeTargetZ();

        const duration = 1100;
        const start = performance.now();
        const from = [...state.currentZ];
        const pos = state.pointsMesh.geometry.attributes.position.array;

        function step(now) {
            const t = Math.min((now - start) / duration, 1);
            const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

            for (let i = 0; i < state.points.length; i++) {
                const z = from[i] + (state.targetZ[i] - from[i]) * ease;
                state.currentZ[i] = z;
                pos[i * 3 + 1] = z;
            }

            state.pointsMesh.geometry.attributes.position.needsUpdate = true;
            updateSeparationAccuracy();

            if (t < 1) {
                requestAnimationFrame(step);
            } else {
                autoFitPlaneFromCurrentPoints();
            }
        }

        requestAnimationFrame(step);
    });

    // ---------- Plane controls ----------
    function updatePlane() {
        const z = Number($('plane-z').value);
        const yaw = Number($('plane-yaw').value) * Math.PI / 180;
        const pitch = Number($('plane-pitch').value) * Math.PI / 180;

        // 平面初始朝上（x-z 平面），保留这个基础姿态
        plane.position.y = z;
        plane.rotation.set(Math.PI / 2 + pitch, yaw, 0);

        $('plane-z-val').textContent = z.toFixed(2);
        $('plane-yaw-val').textContent = `${Math.round(yaw * 180 / Math.PI)}°`;
        $('plane-pitch-val').textContent = `${Math.round(pitch * 180 / Math.PI)}°`;
        updateSeparationAccuracy();
    }

    ['plane-z', 'plane-yaw', 'plane-pitch'].forEach(id => {
        $(id).addEventListener('input', updatePlane);
    });

    // ---------- Kernel params display ----------
    $('poly-degree').addEventListener('input', (e) => {
        $('poly-degree-val').textContent = e.target.value;
    });

    $('rbf-gamma').addEventListener('input', (e) => {
        $('rbf-gamma-val').textContent = e.target.value;
    });

    // ---------- Default preset ----------
    function applyDefaultMode() {
        $('kernel-type').value = 'poly';
        $('poly-degree').value = '3';
        $('rbf-gamma').value = '1.2';
        $('poly-degree-val').textContent = '3';
        $('rbf-gamma-val').textContent = '1.2';

        $('plane-z').value = '0';
        $('plane-yaw').value = '0';
        $('plane-pitch').value = '0';
        updatePlane();
    }

    $('default-mode-btn').addEventListener('click', () => {
        applyDefaultMode();
        if (state.points.length && state.pointsMesh) {
            createOrUpdatePoints(0);
            setStatus('已切换为默认参数模式。');
        }
    });

    updatePlane();

    // 给出一个默认内置数据（方便立即体验）
    const defaultCsv = `x,y,label
-2.2,-1.8,A
-2.0,-1.3,A
-1.8,-0.9,A
-1.5,-0.6,A
-1.2,-0.2,A
-0.9,0.2,A
-0.6,0.6,A
-0.3,1.0,A
0.2,1.4,A
0.7,1.8,A
1.1,2.1,A
1.5,2.4,A
2.1,-2.0,A
1.7,-1.6,A
1.3,-1.2,A
0.8,-0.8,A
-2.1,1.9,B
-1.7,1.4,B
-1.2,0.9,B
-0.7,0.4,B
-0.2,-0.1,B
0.3,-0.6,B
0.8,-1.1,B
1.3,-1.6,B
1.8,-2.1,B
2.2,1.8,B
1.8,1.3,B
1.3,0.8,B
0.8,0.3,B
0.2,-0.2,B
-0.3,-0.7,B
-0.8,-1.2,B`;
    parseCsv(defaultCsv);
    $('preset-dataset').value = 'xor';
    applyDefaultMode();
    visualizeFromSelection(false);
</script>
</body>
