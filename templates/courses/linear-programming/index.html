<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>线性规划 - OptLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #D84315;
            --secondary-color: #FF8F00;
            --bg-color: #FFFAF0;
        }
        body { background-color: var(--bg-color); color: #5d4037; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <a href="/courses/" class="inline-block bg-orange-600 text-white font-bold px-4 py-2 rounded-xl shadow-sm mb-8 hover:translate-x-1 transition-all">
            返回课程页
        </a>

        <header class="mb-12 text-center md:text-left">
            <h1 class="text-4xl md:text-5xl font-black text-amber-900 mb-4">线性规划实验</h1>
            <p class="text-lg text-amber-800 opacity-80">探索单纯形法的奥秘，掌握资源分配的最优策略。</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- 算法介绍卡片 -->
            <div class="card bg-white p-8 rounded-3xl shadow-lg border border-amber-100 flex flex-col justify-between">
                <div>
                    <div class="w-16 h-16 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center text-2xl mb-6">
                        <i class="fas fa-book-open"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-amber-900 mb-3">算法介绍</h2>
                    <p class="text-gray-600 mb-8 leading-relaxed">
                        深入理解线性规划的基本概念、标准型转化以及基本可行解的几何意义。
                    </p>
                </div>
                <a href="introduction/main.html" class="block w-full text-center py-4 bg-amber-50 text-amber-700 font-bold rounded-xl border-2 border-amber-200 hover:bg-amber-100 transition">
                    开始学习
                </a>
            </div>

            <!-- 单纯形法交互实验卡片 -->
            <div class="card bg-white p-8 rounded-3xl shadow-lg border border-amber-100 flex flex-col justify-between">
                <div>
                    <div class="w-16 h-16 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center text-2xl mb-6">
                        <i class="fas fa-calculator"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-amber-900 mb-3">单纯形法交互实验</h2>
                    <p class="text-gray-600 mb-8 leading-relaxed">
                        自定义线性规划问题，观察每一步单纯形表的迭代变化，直观感受算法寻找最优解的过程。
                    </p>
                </div>
                <a href="simplex/main.html" class="block w-full text-center py-4 bg-orange-600 text-white font-bold rounded-xl shadow-lg shadow-orange-200 hover:bg-orange-700 transition">
                    进入实验
                </a>
            </div>
        </div>
    </div>
</body>
</html>
