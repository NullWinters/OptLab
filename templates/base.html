<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OptLab{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/vendors/font-awesome/all.min.css">
    <link rel="stylesheet" href="/static/css/components/ai-sidebar.css">
    <link rel="stylesheet" href="/static/css/components/experiment-notes.css">
    <link rel="stylesheet" href="/static/css/components/login-modal.css">
    <link rel="stylesheet" href="/static/css/components/top-nav.css">
    <style>
        body.modal-open {
            overflow: hidden;
            overscroll-behavior: none;
            height: 100vh;
        }

        .modal,
        .exp-notes-confirm-overlay,
        .login-modal-overlay,
        .simplex-log-modal {
            overscroll-behavior: contain;
        }

        /* 全局滑动条进度填充样式 */
        input[type="range"] {
            --range-progress: 0%;
            /* 默认背景，由 JS 动态更新 linear-gradient 实现填充 */
            background: #e2e8f0;
        }

        /* Firefox 支持 */
        input[type="range"]::-moz-range-progress {
            background-color: var(--range-fill, var(--primary-color, var(--primary, #d84315)));
            height: 6px;
            border-radius: 999px 0 0 999px;
        }

        /* Webkit 内核：支持 linear-gradient 填充时，将背景设为渐变 */
        @supports (-webkit-appearance: none) {
            input[type="range"].range-styled {
                background: linear-gradient(to right, var(--range-fill, var(--primary-color, var(--primary, #d84315))) var(--range-progress), var(--range-track, #ead9c7) var(--range-progress));
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<div id="app-content">
    {% block content %}{% endblock %}
</div>

{% block ai_sidebar %}
{% include 'components/_ai_sidebar.html' %}
{% endblock %}
{% block experiment_notes %}{% endblock %}

<script src="/static/js/api.js"></script>
<script src="/static/js/common/login-modal.js"></script>
<script src="/static/js/vendors/marked/marked.min.js"></script>
<script src="/static/js/common/ai-sidebar.js"></script>
<script src="/static/js/common/experiment-notes.js"></script>
<script>
    (function () {
        function isVisibleModal(el) {
            if (!el) return false;
            if (el.classList.contains('exp-notes-confirm-overlay')) return true;
            if (el.classList.contains('login-modal-overlay')) return el.classList.contains('is-open');
            if (!el.classList.contains('modal')) return false;
            var st = window.getComputedStyle(el);
            return st.display !== 'none' && st.visibility !== 'hidden' && st.opacity !== '0';
        }

        function refreshModalLock() {
            var hasVisibleModal = false;
            document.querySelectorAll('.modal, .exp-notes-confirm-overlay, .login-modal-overlay').forEach(function (el) {
                if (isVisibleModal(el)) hasVisibleModal = true;
            });
            document.body.classList.toggle('modal-open', hasVisibleModal);
        }

        document.addEventListener('DOMContentLoaded', function () {
            refreshModalLock();
            var observer = new MutationObserver(refreshModalLock);
            observer.observe(document.body, {
                subtree: true,
                childList: true,
                attributes: true,
                attributeFilter: ['style', 'class']
            });

            function lockBackgroundScroll(event) {
                if (!document.body.classList.contains('modal-open')) return;
                var inOverlay = event.target.closest('.modal, .login-modal-overlay, .exp-notes-confirm-overlay, .simplex-log-modal');
                if (!inOverlay) {
                    event.preventDefault();
                }
            }

            function isTypingTarget(target) {
                if (!target) return false;
                var tag = target.tagName;
                return tag === 'INPUT' || tag === 'TEXTAREA' || target.isContentEditable;
            }

            function lockBackgroundKeyboardScroll(event) {
                if (!document.body.classList.contains('modal-open')) return;
                if (event.altKey || event.ctrlKey || event.metaKey) return;
                if (isTypingTarget(event.target)) return;

                var blockedKeys = ['PageUp', 'PageDown', 'Home', 'End', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '];
                if (blockedKeys.indexOf(event.key) !== -1) {
                    event.preventDefault();
                }
            }

            window.addEventListener('wheel', lockBackgroundScroll, {passive: false});
            window.addEventListener('touchmove', lockBackgroundScroll, {passive: false});
            window.addEventListener('keydown', lockBackgroundKeyboardScroll, {passive: false});
        });

        /**
         * 初始化所有滑动条的进度填充样式
         */
        function initRangeSliders() {
            const updateFill = (slider) => {
                const minAttr = slider.getAttribute('min');
                const maxAttr = slider.getAttribute('max');
                const min = (minAttr !== null && minAttr !== '') ? parseFloat(minAttr) : 0;
                const max = (maxAttr !== null && maxAttr !== '') ? parseFloat(maxAttr) : 100;
                const val = parseFloat(slider.value);
                const percent = (val - min) / (max - min) * 100;
                slider.style.setProperty('--range-progress', percent + '%');
                slider.classList.add('range-styled');
            };

            const sliders = document.querySelectorAll('input[type="range"]');
            sliders.forEach(slider => {
                updateFill(slider);
                slider.addEventListener('input', () => updateFill(slider));
            });

            // 监听动态添加的滑块
            const observer = new MutationObserver(mutations => {
                mutations.forEach(mutation => {
                    mutation.addedNodes.forEach(node => {
                        if (node.nodeType === 1) {
                            if (node.matches('input[type="range"]')) {
                                updateFill(node);
                                node.addEventListener('input', () => updateFill(node));
                            }
                            node.querySelectorAll('input[type="range"]').forEach(s => {
                                updateFill(s);
                                s.addEventListener('input', () => updateFill(s));
                            });
                        }
                    });
                });
            });
            observer.observe(document.body, {childList: true, subtree: true});
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initRangeSliders);
        } else {
            initRangeSliders();
        }
    })();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
