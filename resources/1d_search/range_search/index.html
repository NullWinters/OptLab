<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一维搜索方法：区间搜索</title>
    <style>
        body {
            font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fffaf0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #5d4037;
        }

        .container {
            text-align: center;
            max-width: 900px;
            padding: 60px 40px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(216, 67, 21, 0.1);
        }

        h1 {
            color: #d84315;
            margin-bottom: 15px;
            font-size: 2.8em;
        }

        .description {
            font-size: 1.3em;
            margin-bottom: 50px;
            color: #8d6e63;
            line-height: 1.6;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 改为3列 */
            gap: 30px;
        }

        .module-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 180px;
            text-decoration: none;
            color: white;
            border-radius: 20px;
            font-size: 1.6em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .module-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
        }

        .introduction { background: linear-gradient(135deg, #ffb300, #ff8f00); }    /* 橙黄 */
        .observe { background: linear-gradient(135deg, #fdd835, #f9a825); }        /* 明黄/金黄 */
        .compare { background: linear-gradient(135deg, #e53935, #b71c1c); }       /* 红色/深红 */

        .module-card span {
            margin-top: 12px;
            font-size: 0.55em;
            font-weight: normal;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.85;
        }

        @media (max-width: 800px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 30px 20px;
                margin: 20px;
            }
            h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>一维搜索算法 ～ 区间搜索</h1>
        <p class="description">学习并对比黄金分割法与斐波那契数列法如何求解单谷函数的极小点区间</p>

        <div class="grid-container">
            <a href="introduction.html" class="module-card introduction">
                算法介绍
                <span>Introduction</span>
            </a>
            <a href="observe_and_explore.html" class="module-card observe">
                观察与探索
                <span>Observe & Explore</span>
            </a>
            <a href="compare_and_insight.html" class="module-card compare">
                对比与洞察
                <span>Compare & Insight</span>
            </a>
        </div>
    </div>
</body>
</html>
